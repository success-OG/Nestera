<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#061a1a">
  <title>Offline - Nestera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #061a1a 0%, #0a2f2f 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 24px;
      opacity: 0.8;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #00d4c0;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 32px;
      opacity: 0.9;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    button {
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 200px;
    }
    .primary {
      background: #00d4c0;
      color: #061a1a;
    }
    .primary:hover {
      background: #00bfad;
      transform: translateY(-1px);
    }
    .secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }
    .secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .status {
      margin-top: 32px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      font-size: 14px;
      opacity: 0.7;
    }
    .online { color: #00d4c0; }
    .offline { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Nestera needs an internet connection to access your savings and blockchain data securely.</p>
    
    <div class="actions">
      <button class="primary" onclick="retry()">Try Again</button>
      <button class="secondary" onclick="goHome()">Go to Home</button>
    </div>

    <div class="status">
      Connection: <span id="status" class="offline">Offline</span>
    </div>
  </div>

  <script>
    function retry() {
      window.location.reload();
    }

    function goHome() {
      window.location.href = '/';
    }

    // Monitor connection status
    function updateStatus() {
      const status = document.getElementById('status');
      if (navigator.onLine) {
        status.textContent = 'Online';
        status.className = 'online';
        // Auto-retry after coming back online
        setTimeout(() => window.location.reload(), 1000);
      } else {
        status.textContent = 'Offline';
        status.className = 'offline';
      }
    }

    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
